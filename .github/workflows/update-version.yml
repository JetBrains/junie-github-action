name: Update Junie Version

on:
  repository_dispatch:
    types: [junie_release]

jobs:
  update-junie-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Junie Version via Junie
        id: update-version
        uses: JetBrains/junie-github-action@main
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          custom_github_token: ${{ secrets.GH_PAT }}
          prompt: |
            Please update Junie CLI version to ${{ github.event.client_payload.version }} in the following files:
            
            1. **action.yml**
               - Find the `junie_version` input parameter
               - Update the default value to `${{ github.event.client_payload.version }}`
            
            2. **README.md**
               - In the "Junie Configuration" section, find the table with input parameters
               - Locate the row for `junie_version` parameter
               - Update the default value in that row to `${{ github.event.client_payload.version }}`

      - name: Send Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Junie Version Update to ${{ github.event.client_payload.version }} completed with status: ${{ steps.update-version.outcome }}",
              "attachments": [
                {
                  "color": "${{ steps.update-version.outcome == 'success' && 'good' || 'danger' }}",
                  "fields": [
                    {
                      "title": "Workflow",
                      "value": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Update Junie Version>",
                      "short": true
                    },
                    {
                      "title": "Status",
                      "value": "${{ steps.update-version.outcome }}",
                      "short": true
                    },
                    {
                      "title": "New Version",
                      "value": "${{ github.event.client_payload.version }}",
                      "short": true
                    },
                    {
                      "title": "PR Created",
                      "value": "${{ steps.update-version.outputs.pr_url || 'No PR created' }}",
                      "short": true
                    }
                  ]
                }
              ]
            }