name: Junie Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4                                               
        with:
          fetch-depth: 1

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.JUNIE_APP_ID }}
          private-key: ${{ secrets.JUNIE_APP_PRIVATE_KEY }}

      - uses: JetBrains/junie-github-action@main
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          use_single_comment: "true"
          prompt: "code-review"
          custom_github_token: ${{ steps.app-token.outputs.token }}
