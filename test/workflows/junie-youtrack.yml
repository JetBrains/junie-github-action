name: Junie YouTrack Integration

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action type'
        default: 'youtrack_event'
        required: true
        type: string
      issue_id:
        description: 'YouTrack issue ID (e.g., PROJ-123)'
        required: true
        type: string
      issue_url:
        description: 'Full URL to the YouTrack issue'
        required: false
        type: string
      issue_title:
        description: 'YouTrack issue summary/title'
        required: true
        type: string
      issue_description:
        description: 'YouTrack issue description'
        required: false
        type: string
      issue_comments:
        description: 'YouTrack issue comments (plain text)'
        required: false
        type: string
      trigger_comment:
        description: 'Optional comment that triggered Junie (used as user instruction)'
        required: false
        type: string
      youtrack_base_url:
        description: 'YouTrack instance base URL (e.g., https://youtrack.example.com)'
        required: true
        type: string

jobs:
  junie:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    if: ${{ inputs.action == 'youtrack_event' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Junie
        uses: JetBrains/junie-github-action@main
        with:
          junie_api_key: ${{ secrets.JUNIE_API_KEY }}
          youtrack_token: ${{ secrets.YOUTRACK_TOKEN }}